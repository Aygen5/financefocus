services:
  financefocus-db:
    image: postgres:16-alpine
    container_name: financefocus-postgres
    restart: always
    environment:
      POSTGRES_DB: financefocus_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d financefocus_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
