name: Enterprise CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  backend-ci:
    name: Backend CI & Quality Gates
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET 10 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Cache NuGet Packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore Backend Dependencies
      run: dotnet restore backend/FinanceFocus.slnx

    - name: Build Backend Solution
      run: dotnet build backend/FinanceFocus.slnx --configuration Release --no-restore

    - name: Run Automated Unit Tests
      run: dotnet test backend/FinanceFocus.slnx --configuration Release --no-build --verbosity normal

  frontend-ci:
    name: Frontend CI & Build Verification
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Frontend Dependencies
      run: npm ci
      working-directory: ./frontend

    - name: Build Frontend Application
      run: npm run build
      working-directory: ./frontend

  docker-ci:
    name: Docker Multi-Stage Build & Image Verification
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Backend Docker Image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: false
        tags: |
          financefocus-api:latest
          financefocus-api:${{ github.sha }}
