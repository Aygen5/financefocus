<body class="bg-background min-h-screen flex items-center justify-center p-4 antialiased text-on-background">
<main class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-[0_10px_15px_-3px_rgba(0,0,0,0.05),0_4px_6px_-2px_rgba(0,0,0,0.03)] border border-outline-variant p-gutter md:p-margin-desktop">
<!-- Header -->
<div class="flex flex-col items-center mb-stack-lg text-center">
<div class="w-12 h-12 bg-primary-container rounded-lg flex items-center justify-center mb-stack-md">
<span class="material-symbols-outlined text-on-primary" data-icon="account_balance">account_balance</span>
</div>
<h1 class="font-headline-lg text-headline-lg md:font-headline-lg md:text-headline-lg text-on-surface mb-2">FinanceFocus</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Welcome back. Please log in to your account.</p>
</div>
<!-- Form -->
<form class="space-y-stack-md" onsubmit="event.preventDefault();">
<!-- Email Input -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface mb-stack-sm" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface bg-surface-container-lowest focus:outline-none focus:border-primary focus:ring-3 focus:ring-primary/20 transition-all placeholder-outline-variant" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div>
<div class="flex items-center justify-between mb-stack-sm">
<label class="block font-label-sm text-label-sm text-on-surface" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:text-primary-fixed transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface bg-surface-container-lowest focus:outline-none focus:border-primary focus:ring-3 focus:ring-primary/20 transition-all placeholder-outline-variant" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary border-outline-variant rounded cursor-pointer" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-body-sm text-body-sm text-on-surface-variant cursor-pointer" for="remember-me">
                    Remember me for 30 days
                </label>
</div>
<!-- Submit Button -->
<button class="w-full flex justify-center py-2 px-4 border border-transparent rounded-lg shadow-sm font-label-md text-label-md text-on-primary bg-primary-container hover:bg-primary-container/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors mt-stack-lg" type="submit">
                Log In
            </button>
</form>
<!-- Sign Up Link -->
<div class="mt-stack-lg text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                Don't have an account? 
                <a class="font-label-md text-label-md text-primary hover:text-primary-fixed transition-colors ml-1" href="#">Sign up</a>
</p>
</div>
