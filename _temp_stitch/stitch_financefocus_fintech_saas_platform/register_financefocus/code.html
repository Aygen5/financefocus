<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Register - FinanceFocus</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>

                      "inverse-on-surface": "#f0f0fb",
                      "surface-variant": "#e1e2ed",
                      "secondary": "#505f76",
                      "surface-container-low": "#f3f3fe",
                      "primary-fixed-dim": "#b4c5ff",
                      "on-surface-variant": "#434655",
                      "primary-fixed": "#dbe1ff",

                      "on-surface": "#191b23",

                      "surface": "#faf8ff",

                      "error-container": "#ffdad6",
                      "on-tertiary-container": "#ffede6",
                      "on-error": "#ffffff",

                      "on-secondary": "#ffffff",

                      "error": "#ba1a1a",

              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",

              "spacing": {

                      "stack-lg": "32px",

                      "stack-md": "16px",

                      "gutter": "24px",
                      "margin-desktop": "40px",
                      "margin-mobile": "16px"
              },
              "fontFamily": {
                      "headline-lg": ["Inter"],
                      "body-lg": ["Inter"],

<body class="bg-background text-on-background font-body-md min-h-screen flex items-center justify-center p-gutter">
<div class="w-full max-w-md bg-surface-container-lowest border border-outline-variant rounded-xl shadow-[0_10px_15px_-3px_rgba(0,0,0,0.05),_0_4px_6px_-2px_rgba(0,0,0,0.03)] p-8">
<!-- Logo Header -->
<div class="text-center mb-stack-lg">
<h1 class="font-headline-lg text-headline-lg text-primary mb-stack-sm tracking-tight">FinanceFocus</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Create your account</p>
</div>
<!-- Registration Form -->
<form action="#" class="flex flex-col gap-stack-md" method="POST">
<!-- Full Name -->
<div class="flex flex-col gap-base">
<label class="font-label-sm text-label-sm text-on-surface" for="fullName">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none">person</span>
<input class="w-full pl-10 pr-4 py-2 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-3 focus:ring-primary-container/20 transition-all placeholder:text-outline-variant" id="fullName" name="fullName" placeholder="John Doe" required="" type="text"/>
</div>
</div>
<!-- Email -->
<div class="flex flex-col gap-base">
<label class="font-label-sm text-label-sm text-on-surface" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none">mail</span>
<input class="w-full pl-10 pr-4 py-2 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-3 focus:ring-primary-container/20 transition-all placeholder:text-outline-variant" id="email" name="email" placeholder="john@example.com" required="" type="email"/>
</div>
</div>
<!-- Password -->
<div class="flex flex-col gap-base">
<label class="font-label-sm text-label-sm text-on-surface" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none">lock</span>
<input class="w-full pl-10 pr-4 py-2 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-3 focus:ring-primary-container/20 transition-all placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Confirm Password -->
<div class="flex flex-col gap-base">
<label class="font-label-sm text-label-sm text-on-surface" for="confirmPassword">Confirm Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none">lock</span>
<input class="w-full pl-10 pr-4 py-2 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-3 focus:ring-primary-container/20 transition-all placeholder:text-outline-variant" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Terms & Conditions -->
<div class="flex items-center gap-2 mt-stack-sm">
<input class="w-4 h-4 text-primary bg-surface-container-lowest border-outline-variant rounded focus:ring-primary focus:ring-2" id="terms" name="terms" required="" type="checkbox"/>
<label class="font-body-sm text-body-sm text-on-surface-variant" for="terms">
                    I agree to the <a class="text-primary hover:underline" href="#">Terms &amp; Conditions</a> and <a class="text-primary hover:underline" href="#">Privacy Policy</a>
</label>
</div>
<!-- Submit Button -->
<button class="w-full mt-stack-sm py-2 px-4 bg-primary-container text-on-primary font-label-md text-label-md rounded-lg hover:bg-primary-container/90 transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" type="submit">
                Get Started
            </button>
</form>
<!-- Login Link -->
<div class="mt-stack-lg text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                Already have an account? 
                <a class="font-label-md text-label-md text-primary hover:underline transition-all" href="/login">Log in</a>
</p>
</div>
</div>
</body></html>
